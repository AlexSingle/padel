<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Americano Padel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1565C0;
      --accent:  #2E7D32;
      --bg:      #F0F4F8;
      --card:    #ffffff;
      --text:    #1A1A2E;
      --sub:     #5f6368;
      --border:  #DCE3EC;
      --danger:  #C62828;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    header {
      background: var(--primary);
      color: white;
      padding: 10px 16px 8px;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { text-align: center; flex: 1; }
    .header-title h1 { font-size: 18px; font-weight: 700; }
    .header-title p  { font-size: 11px; opacity: .75; margin-top: 1px; }

    /* ── LANGUAGE DROPDOWN ── */
    .lang-dropdown { position: relative; }
    .lang-toggle {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.18);
      border: none; border-radius: 8px;
      color: white; font-size: 13px; font-weight: 700;
      padding: 5px 9px; cursor: pointer;
      transition: background .15s; user-select: none;
      white-space: nowrap;
    }
    .lang-toggle:hover { background: rgba(255,255,255,.28); }
    .lang-flag  { font-size: 18px; line-height: 1; }
    .lang-code  { font-size: 12px; font-weight: 700; }
    .lang-arrow { font-size: 10px; opacity: .8; transition: transform .2s; }
    .lang-dropdown.open .lang-arrow { transform: rotate(180deg); }

    .lang-menu {
      display: none;
      position: absolute; top: calc(100% + 6px); right: 0;
      background: white; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.18);
      overflow: hidden; min-width: 120px; z-index: 300;
    }
    .lang-dropdown.open .lang-menu { display: block; }
    .lang-option {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 14px; cursor: pointer;
      font-size: 14px; font-weight: 600; color: var(--text);
      transition: background .12s;
    }
    .lang-option:hover   { background: var(--bg); }
    .lang-option.active  { color: var(--primary); background: #E8F0FE; }
    .lang-option .flag   { font-size: 20px; }

    /* ── TABS ── */
    .tabs {
      display: flex; background: white;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 62px; z-index: 199;
    }
    .tab {
      flex: 1; padding: 11px 4px; text-align: center;
      font-size: 13px; font-weight: 600; color: var(--sub);
      border-bottom: 2px solid transparent; cursor: pointer;
      transition: color .15s, border-color .15s; user-select: none;
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── PAGES ── */
    .page { display: none; padding: 14px; max-width: 580px; margin: 0 auto; }
    .page.active { display: block; }

    /* ── CARDS ── */
    .card {
      background: var(--card); border-radius: 14px; padding: 16px;
      margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }

    /* ── TOURNAMENT TYPE ── */
    .type-grid {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .type-btn {
      flex: 1; min-width: 120px;
      padding: 12px 10px; border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--bg); cursor: pointer;
      text-align: center; transition: all .15s;
      user-select: none;
    }
    .type-btn.active {
      border-color: var(--primary);
      background: #E8F0FE;
    }
    .type-btn.disabled {
      opacity: .45; cursor: not-allowed;
    }
    .type-icon  { font-size: 22px; display: block; margin-bottom: 4px; }
    .type-label { font-size: 13px; font-weight: 700; display: block; }
    .type-soon  { font-size: 10px; color: var(--sub); display: block; margin-top: 2px; }

    /* ── INPUTS ── */
    .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    input[type="text"] {
      flex: 1; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 16px; outline: none;
      transition: border-color .2s; background: #fafafa;
    }
    input[type="text"]:focus { border-color: var(--primary); background: white; }

    /* ── BUTTONS ── */
    .btn {
      padding: 11px 18px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: opacity .15s, transform .1s; user-select: none;
    }
    .btn:active { opacity: .8; transform: scale(.97); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success {
      background: var(--accent); color: white; width: 100%;
      padding: 15px; font-size: 16px; border-radius: 12px;
    }
    .btn-danger { background: none; color: var(--danger); font-size: 22px; padding: 4px 10px; }

    /* ── TEAM LIST ── */
    .team-item {
      display: flex; align-items: center;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .team-item:last-child { border-bottom: none; }
    .team-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0; margin-right: 10px;
    }
    .team-name-label { flex: 1; font-size: 15px; font-weight: 500; }
    .team-count { font-size: 13px; color: var(--sub); margin-top: 8px; }

    /* ── ROUNDS ── */
    .round-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .round-badge {
      background: var(--primary); color: white;
      padding: 3px 11px; border-radius: 20px; font-size: 12px; font-weight: 700;
    }
    .round-sub { font-size: 12px; color: var(--sub); }

    /* ── MATCH CARD ── */
    .match-card { background: var(--bg); border-radius: 12px; padding: 13px; margin-bottom: 8px; }
    .match-label { font-size: 11px; color: var(--sub); margin-bottom: 7px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .match-teams { display: flex; align-items: center; gap: 6px; }
    .match-team  { flex: 1; text-align: center; }
    .match-team-name { font-size: 15px; font-weight: 700; display: block; line-height: 1.3; word-break: break-word; }
    .vs { font-size: 12px; font-weight: 800; color: var(--sub); flex-shrink: 0; }

    /* ── SCORE ROW ── */
    .score-row { display: flex; align-items: center; gap: 6px; margin-top: 11px; }
    .score-input {
      width: 56px; padding: 7px 4px; text-align: center;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 22px; font-weight: 700; color: var(--primary);
      background: white; outline: none;
      -moz-appearance: textfield;
    }
    .score-input::-webkit-outer-spin-button,
    .score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .score-input:focus { border-color: var(--primary); }
    .score-sep  { font-size: 18px; font-weight: 700; color: var(--sub); }
    .score-side { flex: 1; font-size: 11px; color: var(--sub); text-align: center; font-weight: 600; }

    /* ── STATS GRID ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-box   { background: var(--bg); border-radius: 10px; padding: 10px; text-align: center; }
    .stat-num   { font-size: 26px; font-weight: 800; color: var(--primary); }
    .stat-lbl   { font-size: 11px; color: var(--sub); margin-top: 2px; }

    /* ── STANDINGS ── */
    .standings-table { width: 100%; border-collapse: collapse; }
    .standings-table th {
      font-size: 11px; color: var(--sub); text-align: left;
      padding: 5px 8px; border-bottom: 2px solid var(--border);
      font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    }
    .standings-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .standings-table tr:last-child td { border-bottom: none; }
    .medal  { font-size: 18px; }
    .g-big  { font-size: 16px; font-weight: 800; color: var(--primary); }

    /* ── PLACEHOLDER ── */
    .placeholder-box {
      border: 2px dashed var(--border); border-radius: 12px;
      padding: 18px 16px; text-align: center; color: var(--sub);
    }
    .placeholder-box .ph-icon { font-size: 26px; margin-bottom: 8px; }
    .placeholder-box p { font-size: 13px; line-height: 1.5; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--sub); }
    .empty-state .icon { font-size: 52px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; line-height: 1.5; }

    /* ── PROGRESS ── */
    .progress-wrap { margin-top: 8px; }
    .progress-lbl  { font-size: 12px; color: var(--sub); margin-bottom: 4px; display: flex; justify-content: space-between; }
    .progress-bar  { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div style="width:88px"></div><!-- spacer -->
    <div class="header-title">
      <h1>🎾 Americano Padel</h1>
      <p id="hSubtitle">Генератор турниров</p>
    </div>
    <div class="lang-dropdown" id="langDropdown">
      <button class="lang-toggle" onclick="toggleLangMenu(event)">
        <span class="lang-flag" id="langFlag">🇷🇺</span>
        <span class="lang-code" id="langCode">RU</span>
        <span class="lang-arrow">▾</span>
      </button>
      <div class="lang-menu">
        <div class="lang-option active" onclick="setLang('ru')"><span class="flag">🇷🇺</span> RU</div>
        <div class="lang-option"        onclick="setLang('en')"><span class="flag">🇬🇧</span> EN</div>
        <div class="lang-option"        onclick="setLang('es')"><span class="flag">🇨🇱</span> ES</div>
        <div class="lang-option"        onclick="setLang('pt')"><span class="flag">🇧🇷</span> PT</div>
      </div>
    </div>
  </div>
</header>

<div class="tabs" id="tabBar">
  <div class="tab active" onclick="showTab('teams')" id="tab-btn-teams">👥 Команды</div>
  <div class="tab"        onclick="showTab('games')" id="tab-btn-games">🎯 Игры</div>
  <div class="tab"        onclick="showTab('standings')" id="tab-btn-standings">🏆 Итоги</div>
</div>

<!-- ═══════════════ TAB: TEAMS ═══════════════ -->
<div id="tab-teams" class="page active">

  <!-- Tournament type -->
  <div class="card">
    <div class="card-title" id="ttTypeTitle">Тип турнира</div>
    <div class="type-grid">
      <div class="type-btn active" id="type-americano" onclick="setType('americano')">
        <span class="type-icon">🎾</span>
        <span class="type-label">Americano</span>
      </div>
      <!--
        ╔═══════════════════════════════════════╗
        ║  FUTURE TOURNAMENT TYPES              ║
        ║  Uncomment and implement as needed:   ║
        ║  • Mexicano                           ║
        ║  • Round Robin                        ║
        ║  • King of the Court                  ║
        ╚═══════════════════════════════════════╝
      -->
    </div>
  </div>

  <!-- Teams -->
  <div class="card">
    <div class="card-title" id="ttAddTeam">Добавить команду</div>
    <div class="input-row">
      <input type="text" id="teamInput" placeholder="Название команды"
             onkeypress="if(event.key==='Enter')addTeam()">
      <button class="btn btn-primary" onclick="addTeam()">+</button>
    </div>
    <div id="teamList"></div>
    <div id="teamCount" class="team-count"></div>
  </div>

<div class="card">
    <button class="btn btn-success" id="ttGenBtn" onclick="generateTournament()">
      🎯 Сгенерировать турнир
    </button>
  </div>

</div>

<!-- ═══════════════ TAB: GAMES ═══════════════ -->
<div id="tab-games" class="page">
  <div id="gamesContent">
    <div class="empty-state">
      <div class="icon">🏆</div>
      <p id="emptyGamesText">Добавьте команды<br>и нажмите «Сгенерировать турнир»</p>
    </div>
  </div>
</div>

<!-- ═══════════════ TAB: STANDINGS ═══════════════ -->
<div id="tab-standings" class="page">
  <div id="standingsContent">
    <div class="empty-state">
      <div class="icon">📊</div>
      <p id="emptyStandingsText">Результаты появятся<br>после генерации турнира</p>
    </div>
  </div>
</div>

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let lang         = 'ru';
let L            = LANGS.ru;
let tourneyType  = 'americano';
let teams        = [];
let matches      = [];
// match = { round, num, t1, t2, score1: null, score2: null }

// ══════════════════════════════════════════════
//  LANGUAGE
// ══════════════════════════════════════════════
const LANG_META = {
  ru: { flag: '🇷🇺', code: 'RU' },
  en: { flag: '🇬🇧', code: 'EN' },
  es: { flag: '🇨🇱', code: 'ES' },
  pt: { flag: '🇧🇷', code: 'PT' },
};

function toggleLangMenu(e) {
  e.stopPropagation();
  document.getElementById('langDropdown').classList.toggle('open');
}

document.addEventListener('click', () => {
  document.getElementById('langDropdown').classList.remove('open');
});

function setLang(code) {
  lang = code;
  L    = LANGS[code];

  // Update dropdown button
  const meta = LANG_META[code];
  document.getElementById('langFlag').textContent = meta.flag;
  document.getElementById('langCode').textContent = meta.code;
  document.querySelectorAll('.lang-option').forEach(o =>
    o.classList.toggle('active', o.textContent.trim().endsWith(meta.code)));
  document.getElementById('langDropdown').classList.remove('open');

  // Update static elements
  document.getElementById('hSubtitle').textContent       = L.subtitle;
  document.getElementById('tab-btn-teams').textContent   = L.tabTeams;
  document.getElementById('tab-btn-games').textContent   = L.tabGames;
  document.getElementById('tab-btn-standings').textContent = L.tabStandings;
  document.getElementById('ttTypeTitle').textContent     = L.typeTitle;
  document.getElementById('ttAddTeam').textContent       = L.addTeam;
  document.getElementById('teamInput').placeholder       = L.placeholder;
document.getElementById('ttGenBtn').textContent        = L.genBtn;
  document.getElementById('emptyGamesText').innerHTML    = L.emptyGames;
  document.getElementById('emptyStandingsText').innerHTML = L.emptyStand;

  // Re-render dynamic parts
  renderTeams();
  if (matches.length) {
    const rounds = getRoundsFromMatches();
    renderGames(rounds);
    renderStandings();
  }
}

// ══════════════════════════════════════════════
//  MATCH GENERATION (round-robin: each vs each)
// ══════════════════════════════════════════════
function generateRoundRobin(teamList) {
  const raw = [];
  for (let i = 0; i < teamList.length; i++)
    for (let j = i + 1; j < teamList.length; j++)
      raw.push({ t1: teamList[i], t2: teamList[j] });
  return applyScheduleRules(shuffle(raw));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.random() * (i + 1) | 0;
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ══════════════════════════════════════════════
//  ROUND BUILDER
// ══════════════════════════════════════════════
function buildRounds(matchList) {
  const rem = [...matchList], rounds = [];
  while (rem.length) {
    const round = [], used = new Set(), keep = [];
    for (const m of rem) {
      if (used.has(m.t1) || used.has(m.t2)) { keep.push(m); continue; }
      round.push(m); used.add(m.t1); used.add(m.t2);
    }
    if (!round.length) { rounds.push([rem.shift()]); continue; }
    rounds.push(round);
    rem.length = 0;
    keep.forEach(m => rem.push(m));
  }
  return rounds;
}

function getRoundsFromMatches() {
  const byRound = {};
  matches.forEach(m => { (byRound[m.round] = byRound[m.round] || []).push(m); });
  return Object.values(byRound);
}

// ══════════════════════════════════════════════
//  GENERATE TOURNAMENT
// ══════════════════════════════════════════════
function generateTournament() {
  if (teams.length < 2) { alert(L.minTeams); return; }

  const raw    = generateRoundRobin(teams);
  const rounds = buildRounds(raw);

  matches = [];
  let num = 1;
  rounds.forEach((round, ri) => {
    round.forEach(m => {
      matches.push({ round: ri+1, num: num++,
        t1: m.t1, t2: m.t2, score1: null, score2: null });
    });
  });

  renderGames(rounds);
  renderStandings();
  showTab('games');
}

// ══════════════════════════════════════════════
//  RENDER GAMES
// ══════════════════════════════════════════════
function renderGames(rounds) {
  const cont = document.getElementById('gamesContent');
  if (!matches.length) {
    cont.innerHTML = `<div class="empty-state"><div class="icon">🎾</div><p>${L.noGames}</p></div>`;
    return;
  }

  let html = `
    <div class="card">
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num">${teams.length}</div><div class="stat-lbl">${L.statTeams}</div></div>
        <div class="stat-box"><div class="stat-num">${matches.length}</div><div class="stat-lbl">${L.statGames}</div></div>
        <div class="stat-box"><div class="stat-num">${rounds.length}</div><div class="stat-lbl">${L.statRounds}</div></div>
        <div class="stat-box"><div class="stat-num">${teams.length - 1}</div><div class="stat-lbl">${L.statEach}</div></div>
      </div>
    </div>`;

  const byRound = {};
  matches.forEach(m => { (byRound[m.round] = byRound[m.round] || []).push(m); });

  Object.keys(byRound).forEach(r => {
    const rm = byRound[r];
    html += `<div class="card">
      <div class="round-header">
        <span class="round-badge">${L.round} ${r}</span>
        <span class="round-sub">${rm.length} ${L.nGames(rm.length)}</span>
      </div>`;

    rm.forEach(m => {
      const idx = matches.indexOf(m);
      const s1  = m.score1 !== null ? m.score1 : '';
      const s2  = m.score2 !== null ? m.score2 : '';
      html += `
        <div class="match-card">
          <div class="match-label">${L.gameLabel} #${m.num}</div>
          <div class="match-teams">
            <div class="match-team"><span class="match-team-name">${esc(m.t1)}</span></div>
            <div class="vs">VS</div>
            <div class="match-team"><span class="match-team-name">${esc(m.t2)}</span></div>
          </div>
          <div class="score-row">
            <span class="score-side">${esc(m.t1)}</span>
            <input type="number" inputmode="numeric" pattern="[0-9]*"
                   class="score-input" min="0" max="99"
                   value="${s1}" placeholder="—"
                   oninput="setScore(${idx},1,this.value)">
            <span class="score-sep">:</span>
            <input type="number" inputmode="numeric" pattern="[0-9]*"
                   class="score-input" min="0" max="99"
                   value="${s2}" placeholder="—"
                   oninput="setScore(${idx},2,this.value)">
            <span class="score-side">${esc(m.t2)}</span>
          </div>
        </div>`;
    });

    html += '</div>';
  });

  cont.innerHTML = html;
}

// ══════════════════════════════════════════════
//  SCORE UPDATE
// ══════════════════════════════════════════════
function setScore(idx, side, val) {
  const v = val === '' ? null : parseInt(val, 10);
  if (side === 1) matches[idx].score1 = v;
  else            matches[idx].score2 = v;
  renderStandings();
}

// ══════════════════════════════════════════════
//  RENDER STANDINGS
//  Sort: geims → points → played
// ══════════════════════════════════════════════
function renderStandings() {
  const cont = document.getElementById('standingsContent');
  if (!matches.length) {
    cont.innerHTML = `<div class="empty-state"><div class="icon">📊</div><p>${L.firstGen}</p></div>`;
    return;
  }

  const st = {};
  teams.forEach(t => { st[t] = { name: t, played: 0, wins: 0, draws: 0, losses: 0, points: 0, geims: 0 }; });

  matches.forEach(m => {
    if (m.score1 === null || m.score2 === null) return;
    const s1 = m.score1, s2 = m.score2;
    // геймы = сумма забитых очков из матчей
    st[m.t1].played++; st[m.t1].geims += s1;
    st[m.t2].played++; st[m.t2].geims += s2;
    // очки = 2 за победу, 1 за ничью, 0 за поражение
    if (s1 > s2) {
      st[m.t1].wins++;  st[m.t1].points += 3;
      st[m.t2].losses++;
    } else if (s1 < s2) {
      st[m.t2].wins++;  st[m.t2].points += 3;
      st[m.t1].losses++;
    } else {
      st[m.t1].draws++; st[m.t1].points += 1;
      st[m.t2].draws++; st[m.t2].points += 1;
    }
  });

  const sorted = Object.values(st).sort((a, b) =>
    b.points !== a.points ? b.points - a.points :
    b.geims  !== a.geims  ? b.geims  - a.geims  :
    b.played - a.played);

  const played = matches.filter(m => m.score1 !== null && m.score2 !== null).length;
  const total  = matches.length;
  const pct    = total ? Math.round(played / total * 100) : 0;
  const MEDALS = ['🥇','🥈','🥉'];

  cont.innerHTML = `
    <div class="card">
      <div class="card-title">${L.standTitle}</div>
      <div class="progress-wrap">
        <div class="progress-lbl">
          <span>${L.progress}</span><span>${played} / ${total} ${L.nGames(total)}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="card">
      <table class="standings-table">
        <thead>
          <tr>
            <th>#</th>
            <th>${L.colTeam}</th>
            <th title="${L.ttP}">${L.colP}</th>
            <th title="${L.ttW}" style="color:var(--accent)">${L.colW}</th>
            <th title="${L.ttD}">${L.colD}</th>
            <th title="${L.ttL}" style="color:var(--danger)">${L.colL}</th>
            <th title="${L.ttPts}">${L.colPts}</th>
            <th title="${L.ttG}"><strong>${L.colG}</strong></th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map((t, i) => `
            <tr>
              <td><span class="medal">${MEDALS[i] || i+1}</span></td>
              <td><strong>${esc(t.name)}</strong></td>
              <td style="color:var(--sub)">${t.played}</td>
              <td style="color:var(--accent);font-weight:600">${t.wins}</td>
              <td style="color:var(--sub)">${t.draws}</td>
              <td style="color:var(--danger)">${t.losses}</td>
              <td style="color:var(--sub)">${t.points}</td>
              <td><span class="g-big">${t.geims}</span></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}
