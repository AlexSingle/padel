<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Americana Padel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1565C0;
      --accent:  #2E7D32;
      --bg:      #F0F4F8;
      --card:    #ffffff;
      --text:    #1A1A2E;
      --sub:     #5f6368;
      --border:  #DCE3EC;
      --danger:  #C62828;
      --gold:    #F9A825;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    header {
      background: var(--primary);
      color: white;
      padding: 14px 16px 12px;
      text-align: center;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    header h1 { font-size: 19px; font-weight: 700; }
    header p  { font-size: 12px; opacity: .8; margin-top: 2px; }

    /* ── TABS ── */
    .tabs {
      display: flex; background: white;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 58px; z-index: 199;
    }
    .tab {
      flex: 1; padding: 11px 4px; text-align: center;
      font-size: 13px; font-weight: 600; color: var(--sub);
      border-bottom: 2px solid transparent; cursor: pointer;
      transition: color .15s, border-color .15s; user-select: none;
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── PAGES ── */
    .page { display: none; padding: 14px; max-width: 580px; margin: 0 auto; }
    .page.active { display: block; }

    /* ── CARDS ── */
    .card {
      background: var(--card); border-radius: 14px; padding: 16px;
      margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }

    /* ── INPUTS ── */
    .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    input[type="text"] {
      flex: 1; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 16px; outline: none;
      transition: border-color .2s; background: #fafafa;
    }
    input[type="text"]:focus { border-color: var(--primary); background: white; }

    /* ── BUTTONS ── */
    .btn {
      padding: 11px 18px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: opacity .15s, transform .1s; user-select: none;
    }
    .btn:active { opacity: .8; transform: scale(.97); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success {
      background: var(--accent); color: white; width: 100%;
      padding: 15px; font-size: 16px; border-radius: 12px;
    }
    .btn-danger { background: none; color: var(--danger); font-size: 22px; padding: 4px 10px; }

    /* ── TEAM LIST ── */
    .team-item {
      display: flex; align-items: center;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .team-item:last-child { border-bottom: none; }
    .team-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0; margin-right: 10px;
    }
    .team-name-label { flex: 1; font-size: 15px; font-weight: 500; }
    .team-count { font-size: 13px; color: var(--sub); margin-top: 8px; }

    /* ── ROUNDS ── */
    .round-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .round-badge {
      background: var(--primary); color: white;
      padding: 3px 11px; border-radius: 20px; font-size: 12px; font-weight: 700;
    }
    .round-sub { font-size: 12px; color: var(--sub); }

    /* ── MATCH CARD ── */
    .match-card {
      background: var(--bg); border-radius: 12px;
      padding: 13px; margin-bottom: 8px;
    }
    .match-label {
      font-size: 11px; color: var(--sub); margin-bottom: 7px;
      font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
    }
    .match-teams { display: flex; align-items: center; gap: 6px; }
    .match-team  { flex: 1; text-align: center; }
    .match-team-name {
      font-size: 15px; font-weight: 700; display: block;
      line-height: 1.3; word-break: break-word;
    }
    .vs { font-size: 12px; font-weight: 800; color: var(--sub); flex-shrink: 0; }

    /* ── SCORE ROW ── */
    .score-row { display: flex; align-items: center; gap: 6px; margin-top: 11px; }
    .score-input {
      width: 56px; padding: 7px 4px; text-align: center;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 22px; font-weight: 700; color: var(--primary);
      background: white; outline: none;
      /* hide number spinners */
      -moz-appearance: textfield;
    }
    .score-input::-webkit-outer-spin-button,
    .score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .score-input:focus { border-color: var(--primary); }
    .score-sep  { font-size: 18px; font-weight: 700; color: var(--sub); }
    .score-side { flex: 1; font-size: 11px; color: var(--sub); text-align: center; font-weight: 600; }

    /* ── STATS GRID ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-box   { background: var(--bg); border-radius: 10px; padding: 10px; text-align: center; }
    .stat-num   { font-size: 26px; font-weight: 800; color: var(--primary); }
    .stat-lbl   { font-size: 11px; color: var(--sub); margin-top: 2px; }

    /* ── STANDINGS ── */
    .standings-table { width: 100%; border-collapse: collapse; }
    .standings-table th {
      font-size: 11px; color: var(--sub); text-align: left;
      padding: 5px 8px; border-bottom: 2px solid var(--border);
      font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    }
    .standings-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .standings-table tr:last-child td { border-bottom: none; }
    .medal { font-size: 18px; }
    .pts-big { font-size: 16px; font-weight: 800; color: var(--primary); }

    /* ── PLACEHOLDER ── */
    .placeholder-box {
      border: 2px dashed var(--border); border-radius: 12px;
      padding: 18px 16px; text-align: center; color: var(--sub);
    }
    .placeholder-box .ph-icon { font-size: 26px; margin-bottom: 8px; }
    .placeholder-box p { font-size: 13px; line-height: 1.5; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--sub); }
    .empty-state .icon { font-size: 52px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; line-height: 1.5; }

    /* ── PROGRESS ── */
    .progress-wrap { margin-top: 8px; }
    .progress-lbl  { font-size: 12px; color: var(--sub); margin-bottom: 4px; display: flex; justify-content: space-between; }
    .progress-bar  { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
  </style>
</head>
<body>

<header>
  <h1>🎾 Americana Padel</h1>
  <p>Генератор турниров</p>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('teams')">👥 Команды</div>
  <div class="tab"        onclick="showTab('games')">🎯 Игры</div>
  <div class="tab"        onclick="showTab('standings')">🏆 Итоги</div>
</div>

<!-- ═══════════════ TAB: TEAMS ═══════════════ -->
<div id="tab-teams" class="page active">

  <div class="card">
    <div class="card-title">Добавить команду</div>
    <div class="input-row">
      <input type="text" id="teamInput" placeholder="Название команды"
             onkeypress="if(event.key==='Enter')addTeam()">
      <button class="btn btn-primary" onclick="addTeam()">+</button>
    </div>
    <div id="teamList"></div>
    <div id="teamCount" class="team-count"></div>
  </div>

  <!--
    ╔══════════════════════════════════════════════╗
    ║   ПРАВИЛА СОСТАВЛЕНИЯ РАСПИСАНИЯ — БУДУЩЕЕ   ║
    ║                                              ║
    ║  Здесь можно реализовать:                    ║
    ║  • Фиксированные пары в одном раунде         ║
    ║  • Запрет на определённые встречи            ║
    ║  • Сидирование команд                        ║
    ║  Хук: функция applyScheduleRules(matches)    ║
    ╚══════════════════════════════════════════════╝
  -->
  <div class="card">
    <div class="card-title">⚙️ Правила расписания</div>
    <div class="placeholder-box">
      <div class="ph-icon">🔧</div>
      <p>Здесь появятся настройки расписания:<br>
         фиксированные матчи, сиды и т.д.</p>
    </div>
  </div>

  <div class="card">
    <button class="btn btn-success" onclick="generateTournament()">
      🎯 Сгенерировать турнир
    </button>
  </div>

</div>

<!-- ═══════════════ TAB: GAMES ═══════════════ -->
<div id="tab-games" class="page">
  <div id="gamesContent">
    <div class="empty-state">
      <div class="icon">🏆</div>
      <p>Добавьте команды<br>и нажмите «Сгенерировать турнир»</p>
    </div>
  </div>
</div>

<!-- ═══════════════ TAB: STANDINGS ═══════════════ -->
<div id="tab-standings" class="page">
  <div id="standingsContent">
    <div class="empty-state">
      <div class="icon">📊</div>
      <p>Результаты появятся<br>после генерации турнира</p>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let teams   = [];
let matches = [];
// match = { round, num, t1: "name", t2: "name", score1: null, score2: null }

// ══════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════
function showTab(name) {
  const TABS = ['teams','games','standings'];
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', TABS[i] === name));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ══════════════════════════════════════════════
//  TEAMS
// ══════════════════════════════════════════════
function addTeam() {
  const inp  = document.getElementById('teamInput');
  const name = inp.value.trim();
  if (!name) return;
  if (teams.find(t => t.toLowerCase() === name.toLowerCase())) {
    alert('Команда с таким названием уже есть');
    return;
  }
  teams.push(name);
  inp.value = '';
  renderTeams();
  inp.focus();
}

function removeTeam(i) {
  teams.splice(i, 1);
  renderTeams();
}

function renderTeams() {
  const list  = document.getElementById('teamList');
  const count = document.getElementById('teamCount');

  if (!teams.length) {
    list.innerHTML = '<p style="color:var(--sub);font-size:14px;padding:6px 0">Пока нет команд</p>';
    count.textContent = '';
    return;
  }

  list.innerHTML = teams.map((t, i) => `
    <div class="team-item">
      <div class="team-num">${i+1}</div>
      <div class="team-name-label">${esc(t)}</div>
      <button class="btn btn-danger" onclick="removeTeam(${i})">×</button>
    </div>`).join('');

  const n     = teams.length;
  const games = n * (n - 1) / 2;
  count.textContent = `${n} команд · ${games} игр`;
}

// ══════════════════════════════════════════════
//  SCHEDULE RULES HOOK
//  Future: modify/reorder/filter matches here.
//  Input:  array of { t1, t2 }
//  Output: same structure, possibly reordered
// ══════════════════════════════════════════════
function applyScheduleRules(matchList) {
  // ── Add custom logic here ──
  return matchList;
}

// ══════════════════════════════════════════════
//  MATCH GENERATION  (round-robin: each vs each)
// ══════════════════════════════════════════════
function generateRoundRobin(teamList) {
  const raw = [];
  for (let i = 0; i < teamList.length; i++)
    for (let j = i + 1; j < teamList.length; j++)
      raw.push({ t1: teamList[i], t2: teamList[j] });

  return applyScheduleRules(shuffle(raw));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.random() * (i + 1) | 0;
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ══════════════════════════════════════════════
//  ROUND BUILDER
//  Groups matches so no team plays twice per round
// ══════════════════════════════════════════════
function buildRounds(matchList) {
  const rem    = [...matchList];
  const rounds = [];

  while (rem.length) {
    const round = [];
    const used  = new Set();
    const keep  = [];

    for (const m of rem) {
      if (used.has(m.t1) || used.has(m.t2)) { keep.push(m); continue; }
      round.push(m);
      used.add(m.t1);
      used.add(m.t2);
    }

    if (!round.length) { rounds.push([rem.shift()]); continue; } // safety
    rounds.push(round);
    rem.length = 0;
    keep.forEach(m => rem.push(m));
  }

  return rounds;
}

// ══════════════════════════════════════════════
//  GENERATE TOURNAMENT
// ══════════════════════════════════════════════
function generateTournament() {
  if (teams.length < 2) {
    alert('Нужно минимум 2 команды');
    return;
  }

  const raw    = generateRoundRobin(teams);
  const rounds = buildRounds(raw);

  matches = [];
  let num = 1;
  rounds.forEach((round, ri) => {
    round.forEach(m => {
      matches.push({ round: ri + 1, num: num++,
        t1: m.t1, t2: m.t2, score1: null, score2: null });
    });
  });

  renderGames(rounds);
  renderStandings();
  showTab('games');
}

// ══════════════════════════════════════════════
//  RENDER GAMES
// ══════════════════════════════════════════════
function renderGames(rounds) {
  const cont = document.getElementById('gamesContent');
  if (!matches.length) {
    cont.innerHTML = '<div class="empty-state"><div class="icon">🎾</div><p>Нет игр</p></div>';
    return;
  }

  let html = `
    <div class="card">
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num">${teams.length}</div><div class="stat-lbl">Команд</div></div>
        <div class="stat-box"><div class="stat-num">${matches.length}</div><div class="stat-lbl">Всего игр</div></div>
        <div class="stat-box"><div class="stat-num">${rounds.length}</div><div class="stat-lbl">Раундов</div></div>
        <div class="stat-box"><div class="stat-num">${teams.length - 1}</div><div class="stat-lbl">Игр у каждой</div></div>
      </div>
    </div>`;

  const byRound = {};
  matches.forEach(m => { (byRound[m.round] = byRound[m.round] || []).push(m); });

  Object.keys(byRound).forEach(r => {
    const rMatches = byRound[r];
    html += `<div class="card">
      <div class="round-header">
        <span class="round-badge">Раунд ${r}</span>
        <span class="round-sub">${rMatches.length} ${wordGame(rMatches.length)}</span>
      </div>`;

    rMatches.forEach(m => {
      const idx = matches.indexOf(m);
      const s1  = m.score1 !== null ? m.score1 : '';
      const s2  = m.score2 !== null ? m.score2 : '';

      html += `
        <div class="match-card">
          <div class="match-label">Игра #${m.num}</div>
          <div class="match-teams">
            <div class="match-team">
              <span class="match-team-name">${esc(m.t1)}</span>
            </div>
            <div class="vs">VS</div>
            <div class="match-team">
              <span class="match-team-name">${esc(m.t2)}</span>
            </div>
          </div>
          <div class="score-row">
            <span class="score-side">${esc(m.t1)}</span>
            <input type="number" inputmode="numeric" pattern="[0-9]*"
                   class="score-input" min="0" max="99"
                   value="${s1}" placeholder="—"
                   oninput="setScore(${idx},1,this.value)">
            <span class="score-sep">:</span>
            <input type="number" inputmode="numeric" pattern="[0-9]*"
                   class="score-input" min="0" max="99"
                   value="${s2}" placeholder="—"
                   oninput="setScore(${idx},2,this.value)">
            <span class="score-side">${esc(m.t2)}</span>
          </div>
        </div>`;
    });

    html += '</div>';
  });

  cont.innerHTML = html;
}

// ══════════════════════════════════════════════
//  SCORE UPDATE
// ══════════════════════════════════════════════
function setScore(idx, side, val) {
  const v = val === '' ? null : parseInt(val, 10);
  if (side === 1) matches[idx].score1 = v;
  else            matches[idx].score2 = v;
  renderStandings();
}

// ══════════════════════════════════════════════
//  RENDER STANDINGS
//  Ranked by total points scored (sum of all scores)
// ══════════════════════════════════════════════
function renderStandings() {
  const cont = document.getElementById('standingsContent');
  if (!matches.length) {
    cont.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>Сначала сгенерируйте турнир</p></div>';
    return;
  }

  // Init stats
  const st = {};
  teams.forEach(t => { st[t] = { name: t, played: 0, points: 0 }; });

  // Accumulate points
  matches.forEach(m => {
    if (m.score1 === null || m.score2 === null) return;
    st[m.t1].played++;  st[m.t1].points += m.score1;
    st[m.t2].played++;  st[m.t2].points += m.score2;
  });

  // Sort by total points desc, then by games played desc (more games = more info)
  const sorted = Object.values(st).sort((a, b) =>
    b.points !== a.points ? b.points - a.points : b.played - a.played);

  const played = matches.filter(m => m.score1 !== null && m.score2 !== null).length;
  const total  = matches.length;
  const pct    = total ? Math.round(played / total * 100) : 0;
  const MEDALS = ['🥇','🥈','🥉'];

  let html = `
    <div class="card">
      <div class="card-title">Таблица результатов</div>
      <div class="progress-wrap">
        <div class="progress-lbl">
          <span>Прогресс</span><span>${played} / ${total} игр</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="card">
      <table class="standings-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Команда</th>
            <th title="Сыграно игр">И</th>
            <th title="Суммарные очки">Очки</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map((t, i) => `
            <tr>
              <td><span class="medal">${MEDALS[i] || i+1}</span></td>
              <td><strong>${esc(t.name)}</strong></td>
              <td style="color:var(--sub)">${t.played}</td>
              <td><span class="pts-big">${t.points}</span></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  cont.innerHTML = html;
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function wordGame(n) {
  if (n === 1) return 'игра';
  if (n >= 2 && n <= 4) return 'игры';
  return 'игр';
}

// Init
renderTeams();
</script>
</body>
</html>
